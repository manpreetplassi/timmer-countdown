kind = "web"
previewPath = "/"
title = "Stopwatch & Countdown Timer"
version = "1.0.0"
id = "artifacts/timer-widget"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24472
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/timer-widget run dev"

[services.env]
PORT = "24472"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/timer-widget", "run", "build"]
publicDir = "artifacts/timer-widget/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
